<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>订单详情</title>
    <style>
        /* 手机端真机基准字号 */
        html {
            font-size: 20px; 
            -webkit-text-size-adjust: 100%;
        }

        /* 最外层：纯白色背景底儿 */
        body { 
            margin: 0; 
            background-color: #ffffff; 
            font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", "PingFang SC", sans-serif; 
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
        }

        /* 中间大圆角卡片主体：精准匹配 280.png 晴空淡蓝色 */
       /* 修改后的卡片主体：整体缩小一圈 */
      .blue-card-main {
          background-color: #dcedfa; 
          border-radius: 1.5rem; 
          padding: 1.5rem 1.2rem;
          margin-top: 2.5rem;
    
         /* 核心修改：将宽度从 92vw 缩小到 86vw，最大宽度限制从 380px 缩小到 335px */
         width: 86vw; 
          max-width: 335px;
    
         box-shadow: 0 8px 30px rgba(45, 161, 248, 0.05); 
       box-sizing: border-box;
       text-align: center;
       position: relative;
        }

        /* 右上角灰色关闭按钮 */
        .blue-card-main::after {
            content: "×";
            position: absolute;
            top: -2rem;
            right: 0px;
            width: 1.2rem;
            height: 1.2rem;
            background-color: rgba(0, 0, 0, 0.2);
            color: #fff;
            border-radius: 50%;
            font-size: 0.9rem;
            line-height: 1.1rem;
            text-align: center;
            cursor: pointer;
        }
        
        /* 🎨 核心修改：缩小“1张，共1张”字号，取消加粗，高度对齐 280.png */
        .ticket-count {
            color: #555555;
            font-size: 0.88rem; /* 显著缩小字号，恢复精致感 */
            font-weight: 400; /* 取消加粗，改回常规纤细字体 */
            margin-bottom: 1.2rem;
            letter-spacing: 0.5px;
        }
        .ticket-count span { color: #2da1f8; }

        /* 动态二维码红字 */
        .warn-text {
            color: #f09236; 
            font-size: 0.85rem;
            margin-bottom: 0.9rem;
            font-weight: 400;
        }

        /* 二维码外层白色背景框 */
        .qr-container {
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 0.9rem auto;
            width: 190px; 
            height: 190px;
            cursor: pointer;
            background-color: #ffffff; 
            border-radius: 10px;
            border: 2px dashed #2da1f8; 
            box-sizing: border-box;
            color: #2da1f8;
            font-size: 0.85rem;
            font-weight: bold;
            position: relative;
        }

        /* 上传后的图片自动高精裁剪 */
        .qr-container img {
            width: 100% !important;
            height: 100% !important;
            object-fit: cover; 
            object-position: center; 
            image-rendering: -webkit-optimize-contrast;
            display: none; 
            border-radius: 8px;
        }

        /* 隐藏的上传组件 */
        #file-input {
            display: none !important;
        }

        /* 序列号数字 */
        .serial-number {
            color: #9ab0c2; 
            font-size: 0.95rem;
            font-family: "Helvetica Neue", Arial, sans-serif;
            margin-bottom: 0.8rem;
            letter-spacing: 0.3px;
            font-weight: 500;
        }

        /* 倒计时 */
        .countdown {
            color: #f15b4a; 
            font-size: 0.95rem;
            margin-bottom: 1.4rem;
            font-weight: 500;
        }

        /* 明细整行排版 */
        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1.1rem;
            font-size: 0.95rem; 
            line-height: 1.5;
            text-align: left;
        }
        .info-label {
            color: #2c2c2c;
            width: 4.5rem;
            flex-shrink: 0;
            font-weight: 500;
        }
        .info-value {
            color: #8fa0b0; 
            flex-grow: 1;
            text-align: right;
            padding-left: 1rem;
            font-weight: 500;
        }
        .info-value.blue-text {
            color: #7b8b9a; 
            text-align: justify; 
            text-align-last: right; 
        }

        /* 温馨提示框 */
        .tip-box {
            background-color: #fff6ed; 
            border-radius: 8px;
            padding: 0.8rem;
            text-align: justify;
            margin-top: 1.4rem;
            font-size: 0.88rem; 
            line-height: 1.6;
            color: #e67e22; 
            font-weight: 700; 
        }

        /* 紧凑对齐时钟 */
        .time-footer {
            margin-top: 1.5rem; 
            margin-bottom: 2rem;
            color: #b2b2b2;
            font-size: 0.95rem;
            letter-spacing: 0.2px;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="ticket-count"><span>1</span> 张，共 1 张</div>
    <div class="blue-card-main">
        
        
        <div class="warn-text">动态二维码，请勿截图使用</div>
        
        <!-- 二维码点击区 -->
        <div class="qr-container" id="qr-click-zone">
            <span id="upload-hint" style="padding: 10px; text-align: center;">点击此处<br>上传二维码</span>
            <img id="target-qr" src="" alt="二维码">
        </div>
        
        <!-- 隔离隐藏的原生上传控件 -->
        <input type="file" id="file-input" accept="image/*">
        
        <div class="serial-number">22025020213013778543341</div>
        <div class="countdown" id="countdown-text">将在 10 秒后刷新</div>

        <div class="info-row">
            <div class="info-label">产品名称</div>
            <div class="info-value blue-text">环全洲游览线（可直达毛泽东青年艺术雕塑站，含往返）</div>
        </div>
        <div class="info-row">
            <div class="info-label">出游日期</div>
            <div class="info-value" id="travel-date">2026-06-30</div>
        </div>
        <div class="info-row">
            <div class="info-label">检票状态</div>
            <div class="info-value">部分检票</div>
        </div>

        <div class="tip-box">
            <strong>温馨提示：</strong>可在毛泽东青年艺术雕塑站验票处或景区游客中心免费领取明信片一张。
        </div>
        
    </div>
    
    <div class="time-footer" id="display-time">2026-06-30 13:32:30</div>

    <script>
        // 1. 注入今天的出游日期
        (function() {
            var date = new Date();
            var Y = date.getFullYear() + '-';
            var M = String(date.getMonth() + 1).padStart(2, '0') + '-';
            var D = String(date.getDate()).padStart(2, '0');
            document.getElementById("travel-date").innerText = Y + M + D;
        })();

        // 2. 强力 JS 穿透点击上传
        const clickZone = document.getElementById('qr-click-zone');
        const fileInput = document.getElementById('file-input');
        const targetQr = document.getElementById('target-qr');
        const uploadHint = document.getElementById('upload-hint');

        clickZone.addEventListener('click', function() {
            fileInput.click();
        });

        fileInput.addEventListener('change', function(e) {
            const file = e.target.files;
            if (file && file[0]) {
                targetQr.src = URL.createObjectURL(file[0]);
                targetQr.style.display = "block"; 
                uploadHint.style.display = "none";  
                clickZone.style.border = "none";   
            }
        });

        // 3. 驱动底部的精准防伪时钟走动
        let countdown = 10;
        let serverTimestamp = 1782797544348; 

        const countdownEl = document.getElementById("countdown-text");
        const timeEl = document.getElementById("display-time");

        function formatTime(ts) {
            const date = new Date(ts);
            const Y = date.getFullYear() + '-';
            const M = String(date.getMonth() + 1).padStart(2, '0') + '-';
            const D = String(date.getDate()).padStart(2, '0') + ' ';
            const h = String(date.getHours()).padStart(2, '0') + ':';
            const m = String(date.getMinutes()).padStart(2, '0') + ':';
            const s = String(date.getSeconds()).padStart(2, '0');
            return Y + M + D + h + m + s;
        }

        setInterval(function() {
            serverTimestamp += 1000;
            timeEl.innerText = formatTime(serverTimestamp);
            
            countdown--;
            if (countdown <= 0) {
                countdown = 10; 
            }
            countdownEl.innerText = "将在 " + countdown + " 秒后刷新";
        }, 1000);

        window.onload = function() {
            timeEl.innerText = formatTime(serverTimestamp);
            countdownEl.innerText = "将在 " + countdown + " 秒后刷新";
        };
    </script>
</body>
</html>
