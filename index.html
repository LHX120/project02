<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <!-- 核心适配：强制禁止手机端双击缩放，并锁定标准移动端物理视口 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>订单详情</title>
    <style>
        /* 1. 移动端移动视口根级比例初始化（针对手机高分屏防发虚） */
        html {
            font-size: 16px; /* 声明手机基准逻辑像素 */
            -webkit-text-size-adjust: 100%;
        }

        /* 微信冷灰色倾向的背景底色 */
        body { 
            margin: 0; 
            background-color: #f1f6fa; 
            font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", "PingFang SC", "Microsoft YaHei", sans-serif; 
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
        }

        /* 2. 中间包装层：使用 vw（视口宽度）控制，确保在所有尺寸的 iPhone 上四周间距完全一致 */
        .blue-card-bg {
            background-color: #e6f3fd; 
            border-radius: 28px;
            padding: 3.2vw; /* 随手机屏幕宽度完美自动伸缩的一圈蓝色底边缘 */
            margin-top: 8vh; /* 根据手机高度动态调节居中位置 */
            width: 90vw; /* 占据手机屏幕宽度的 90%，两侧留空刚好 */
            max-width: 360px;
            box-sizing: border-box;
            box-shadow: 0 12px 35px rgba(45, 161, 248, 0.16); 
        }

        /* 3. 最上层：纯白色卡片主体 */
        .card {
            background: #ffffff;
            border-radius: 20px; 
            padding: 6vw 5vw; /* 手机端内部舒适的呼吸感留白 */
            width: 100%;
            text-align: center;
            box-sizing: border-box;
            position: relative;
        }

        /* 右上角灰色关闭叉号按钮（在 iPhone 上精准等比放大至易触达大小） */
        .card::after {
            content: "×";
            position: absolute;
            top: -48px;
            right: -2px;
            width: 24px;
            height: 24px;
            background-color: rgba(0, 0, 0, 0.2);
            color: #fff;
            border-radius: 50%;
            font-size: 18px;
            line-height: 22px;
            text-align: center;
            cursor: pointer;
        }
        
        /* 1张，共1张 数量文字：在手机上加强辨识度 */
        .ticket-count {
            color: #2b2b2b;
            font-size: 1.1rem; /* 17.6px 舒适字号 */
            font-weight: 600;
            margin-bottom: 5.5vw;
            letter-spacing: 0.5px;
        }
        .ticket-count span { color: #2da1f8; }

        .warn-text {
            color: #f09236; 
            font-size: 0.85rem; /* 13.6px */
            margin-bottom: 4vw;
            font-weight: 500;
        }

        /* 二维码外层固定大小容器（严格对齐微信小程序真机渲染物理比例） */
        .qr-container {
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 4.5vw auto;
            width: 172px;
            height: 172px;
            cursor: pointer;
            background-color: #fafafa;
            border-radius: 8px;
            border: 1px dashed #2da1f8; 
            box-sizing: border-box;
            color: #2da1f8;
            font-size: 0.9rem;
            font-weight: bold;
        }

        /* 上传后的图片无损等比裁切（解决手机端发虚问题） */
        .qr-container img {
            width: 100% !important;
            height: 100% !important;
            object-fit: cover; 
            object-position: center; 
            image-rendering: -webkit-optimize-contrast;
            display: none; 
        }

        /* 隐藏的原生上传输入框 */
        #file-input {
            display: none !important;
            width: 0 !important;
            height: 0 !important;
        }

        .serial-number {
            color: #b5b5b5; 
            font-size: 0.95rem; /* 15.2px 数字条码清晰可辨 */
            font-family: "Helvetica Neue", Arial, sans-serif;
            margin-bottom: 4vw;
            letter-spacing: 0.3px;
        }

        .countdown {
            color: #f15b4a; 
            font-size: 0.9rem; /* 14.4px */
            margin-bottom: 6vw;
            font-weight: 500;
        }

        /* 4. 手机明细核心排版：解决左右文字挤压与对齐错位 */
        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 4.5vw; /* 手机端各行之间舒适的空气感间距 */
            font-size: 0.9rem; /* 14.4px 标准移动端正文字体 */
            line-height: 1.5;
            text-align: left;
        }
        .info-label {
            color: #2b2b2b;
            width: 72px;
            flex-shrink: 0;
            font-weight: 400;
        }
        .info-value {
            color: #929292; 
            flex-grow: 1;
            text-align: right;
            padding-left: 15px;
        }
        /* 特殊处理多行商品名称在 iPhone 上的左右完美两端对齐 */
        .info-value.blue-text {
            color: #7b8b9a; 
            text-align: justify; 
            text-align-last: right; 
            font-weight: 400;
        }

        /* 5. 提示框精细化移动端适配：强制加大字号，杜绝瞎眼小字 */
        .tip-box {
            background-color: #fff6ed; 
            border-radius: 8px;
            padding: 3.5vw 4vw; /* 加大内边距，提升小屏幕手机的可读性 */
            text-align: justify;
            margin-top: 5.5vw;
            font-size: 0.85rem; /* 调大至 13.6px，在手机上看字号十分完美舒适 */
            line-height: 1.6;
            color: #f09236; 
        }

        /* 6. 底部防伪时钟手机专属字号调校 */
        .time-footer {
            margin-top: auto;
            margin-bottom: 6vw;
            padding-top: 8vw;
            color: #b2b2b2;
            font-size: 0.88rem; /* 14px */
            letter-spacing: 0.2px;
            font-weight: 400;
        }
    </style>
</head>
<body>

    <!-- 外部淡蓝色包装层 -->
    <div class="blue-card-bg">
        
        <!-- 最上层的白卡片主体 -->
        <div class="card">
            <div class="ticket-count"><span>1</span> 张，共 1 张</div>
            <div class="warn-text">动态二维码，请勿截图使用</div>
            
            <!-- 点击此区域立即在手机端唤醒相册并完成自动完美裁剪 -->
            <div class="qr-container" id="qr-click-zone">
                <span id="upload-hint">点击此处上传二维码</span>
                <img id="target-qr" src="" alt="二维码">
            </div>
            
            <!-- 深度隐藏的手机端表单组件 -->
            <input type="file" id="file-input" accept="image/*">
            
            <div class="serial-number">22025020213013778543341</div>
            <div class="countdown" id="countdown-text">将在 10 秒后刷新</div>

            <!-- 详情明细列表 -->
            <div class="info-row">
                <div class="info-label">产品名称</div>
                <div class="info-value blue-text">环全洲游览线（可直达毛泽东青年艺术雕塑站，含往返）</div>
            </div>
            <div class="info-row">
                <div class="info-label">出游日期</div>
                <div class="info-value" id="travel-date">2026-06-30</div>
            </div>
            <div class="info-row">
                <div class="info-label">检票状态</div>
                <div class="info-value" style="color: #929292;">部分检票</div>
            </div>

            <!-- 温馨提示框：字号在移动端已全量做等比视觉膨胀 -->
            <div class="tip-box">
                <strong>温馨提示：</strong>可在毛泽东青年艺术雕塑站验票处或景区游客中心免费领取明信片一张。
            </div>
        </div>
        
    </div>
    
    <!-- 4. 底部防伪滚动时间 -->
    <div class="time-footer" id="display-time">2026-06-30 13:32:30</div>

    <script>
        // 1. 强制无延迟注入今天的出游日期年月日
        (function() {
            var date = new Date();
            var Y = date.getFullYear() + '-';
            var M = String(date.getMonth() + 1).padStart(2, '0') + '-';
            var D = String(date.getDate()).padStart(2, '0');
            document.getElementById("travel-date").innerText = Y + M + D;
        })();

        // 2. 手机真机丝滑调起相册/相机并自动居中裁剪
        const clickZone = document.getElementById('qr-click-zone');
        const fileInput = document.getElementById('file-input');
        const targetQr = document.getElementById('target-qr');
        const uploadHint = document.getElementById('upload-hint');

        clickZone.addEventListener('click', function() {
            fileInput.click();
        });

        fileInput.addEventListener('change', function(e) {
            const file = e.target.files[0]; // 获取手机选中的第一张图片
            if (file) {
                targetQr.src = URL.createObjectURL(file);
                targetQr.style.display = "block"; 
                uploadHint.style.display = "none"; 
                clickZone.style.border = "none";  
            }
        });

        // 3. 驱动底部的防伪时钟与倒计时
        let countdown = 10;
        let serverTimestamp = 1782797544348; 

        const countdownEl = document.getElementById("countdown-text");
        const timeEl = document.getElementById("display-time");

        function formatTime(ts) {
            const date = new Date(ts);
            const Y = date.getFullYear() + '-';
            const M = String(date.getMonth() + 1).padStart(2, '0') + '-';
            const D = String(date.getDate()).padStart(2, '0') + ' ';
            const h = String(date.getHours()).padStart(2, '0') + ':';
            const m = String(date.getMinutes()).padStart(2, '0') + ':';
            const s = String(date.getSeconds()).padStart(2, '0');
            return Y + M + D + h + m + s;
        }

        setInterval(function() {
            serverTimestamp += 1000;
            timeEl.innerText = formatTime(serverTimestamp);
            
            countdown--;
            if (countdown <= 0) {
                countdown = 10; 
            }
            countdownEl.innerText = "将在 " + countdown + " 秒后刷新";
        }, 1000);

        window.onload = function() {
            timeEl.innerText = formatTime(serverTimestamp);
            countdownEl.innerText = "将在 " + countdown + " 秒后刷新";
        };
    </script>
</body>
</html>
